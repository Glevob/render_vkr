<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание упражнения</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { max-width: 600px; border: none; border-radius: 12px; }
        .card-header { background-color: #fff; border-bottom: 1px solid #eee; border-radius: 12px 12px 0 0 !important; }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-5">
    <div class="mb-4 text-center">
        <a href="/exercises" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Вернуться к списку упражнений
        </a>
    </div>

    <div class="card form-card shadow-sm mx-auto">
        <div class="card-header p-4">
            <h4 class="mb-0 fw-bold"><i class="bi bi-plus-circle text-primary me-2"></i>Новое упражнение</h4>
            <small class="text-muted">Заполните данные для добавления в справочник</small>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/exercises/new}" th:object="${exercise}" method="post">

                <!-- Номер -->
                <div class="mb-3">
                    <label class="form-label small fw-bold">№ упражнения</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-list-ol"></i></span>
                        <input type="number" th:field="*{number}" class="form-control" required min="1" placeholder="Например: 1">
                    </div>
                </div>

                <!-- Название -->
                <div class="mb-3">
                    <label class="form-label small fw-bold">Название упражнения</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-card-text"></i></span>
                        <input type="text" th:field="*{name}" class="form-control" required placeholder="Введите название...">
                    </div>
                </div>

                <!-- Категория -->
                <div class="mb-3">
                    <label class="form-label small fw-bold">Категория</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-tag"></i></span>
                        <select th:field="*{category}" class="form-select" required>
                            <option value="">— выберите категорию —</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c}"
                                    th:text="${c.name() == 'STRENGTH' ? 'Сила' : (c.name() == 'SPEED' ? 'Быстрота' : 'Выносливость')}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Тип результата -->
                <div class="mb-3">
                    <label class="form-label small fw-bold">Тип результата</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-stopwatch"></i></span>
                        <select th:field="*{resultType}" class="form-select" required>
                            <option value="">— выберите тип —</option>
                            <option th:each="rt : ${resultTypes}"
                                    th:value="${rt}"
                                    th:text="${rt.name() == 'REPS' ? 'Количество раз' : 'Время'}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Возраст -->
                <div class="mb-4">
                    <label class="form-label small fw-bold">Возрастная группа</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person-badge"></i></span>
                        <select th:field="*{ageGroup}" class="form-select" required>
                            <option value="">— выберите возраст —</option>
                            <option th:each="ag : ${ageGroups}"
                                    th:value="${ag}"
                                    th:text="${ag.name() == T(ru.accouting.student.model.Exercise.AgeGroup).ALL.name()
                                             ? 'Все'
                                             : 'Старше 25'}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary py-2 fw-bold">
                        <i class="bi bi-check-circle me-1"></i> Сохранить упражнение
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
