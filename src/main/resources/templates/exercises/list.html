<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Упражнения</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; }
        .table thead { background-color: #f1f3f5; }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-5">
    <!-- Заголовок и кнопки действий -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark m-0"><i class="bi bi-list-check me-2 text-primary"></i>Упражнения</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin-physical}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Назад к администрированию
            </a>
            <a th:href="@{/exercises/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> Добавить упражнение
            </a>
        </div>
    </div>

    <!-- Таблица -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="text-uppercase small text-muted">
                <tr>
                    <th class="ps-4">№</th>
                    <th>Название</th>
                    <th>Категория</th>
                    <th>Тип результата</th>
                    <th>Возраст</th>
                    <th class="text-end pe-4">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ex : ${exercises}">
                    <td class="ps-4 fw-bold text-secondary" th:text="${ex.number}"></td>
                    <td class="fw-semibold" th:text="${ex.name}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${ex.category.name() == 'STRENGTH' ? 'bg-primary-subtle text-primary' : (ex.category.name() == 'SPEED' ? 'bg-warning-subtle text-warning' : 'bg-success-subtle text-success')}"
                              th:text="${ex.category.name() == 'STRENGTH' ? 'Сила' : (ex.category.name() == 'SPEED' ? 'Быстрота' : 'Выносливость')}">
                        </span>
                    </td>
                    <td>
                        <span class="badge bg-light text-dark border"
                              th:text="${ex.resultType.name() == 'REPS' ? 'Количество раз' : 'Время'}">
                        </span>
                    </td>
                    <td>
                        <span class="badge bg-secondary-subtle text-secondary"
                              th:text="${ex.ageGroup.name() == 'ALL' ? 'Все' : (ex.ageGroup.name() == 'UNDER_25' ? 'До 25 лет' : '25+ лет')}">
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <form th:action="@{'/exercises/delete/' + ${ex.id}}"
                              method="post" class="d-inline"
                              onsubmit="return confirmCascadeDelete();">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i> Удалить
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(exercises)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i> Упражнения пока не добавлены
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmCascadeDelete() {
        return confirm(
            "Вы уверены, что хотите удалить это упражнение?\n" +
            "Все связанные нормы начисления баллов (Приложение №10) будут удалены безвозвратно."
        );
    }
</script>

</body>
</html>
