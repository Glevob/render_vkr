<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Администрирование ФП</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; }
        .table thead { background-color: #f1f3f5; }
        .badge-type { width: 100px; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<div class="container py-5" sec:authorize="hasAuthority('FULL')">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-activity me-2 text-primary"></i>Администрирование ФП</h2>
        <a th:href="@{/exercises}" class="btn btn-outline-primary shadow-sm">
            <i class="bi bi-gear-fill me-1"></i> Управление упражнениями
        </a>
    </div>

    <!-- Блок 1 - Нормы -->
    <div id="norms-table" class="card shadow-sm mb-5">
        <div class="card-header bg-white p-4 border-0">
            <h5 class="mb-0 fw-bold"><i class="bi bi-list-ol text-primary me-2"></i>Таблица начисления баллов (Прил. №10)</h5>
        </div>
        <div class="card-body p-4 pt-0">
            <form th:action="@{/admin-physical/norms}" method="post" th:object="${newNorm}" class="row g-3 mb-4 bg-light p-3 rounded">
                <div class="col-md-5">
                    <label class="form-label small fw-bold">Упражнение</label>
                    <select th:field="*{exercise}" class="form-select" required>
                        <option value="">— выбрать —</option>
                        <option th:each="ex : ${exercises}" th:value="${ex.id}" th:text="${ex.number + ' — ' + ex.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">Результат</label>
                    <input type="number" step="0.01" th:field="*{value}" class="form-control" required placeholder="0.00">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">Баллы</label>
                    <input type="number" th:field="*{points}" class="form-control" required placeholder="0">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-lg"></i></button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr class="text-uppercase small text-muted">
                        <th>№ упр.</th>
                        <th>Вид</th>
                        <th>Тип</th>
                        <th>Результат</th>
                        <th>Баллы</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="n : ${normPage.content}">
                        <td class="fw-bold" th:text="${n.exercise.number}"></td>
                        <td th:text="${n.exercise.name}"></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${n.exercise.resultType?.name() == 'REPS' ? 'bg-info-subtle text-info' : 'bg-warning-subtle text-warning'}"
                                      th:text="${n.exercise.resultType?.name() == 'REPS' ? 'Кол-во раз' : 'Время'}"></span>
                        </td>
                        <td th:text="${n.value}"></td>
                        <td class="fw-bold text-primary" th:text="${n.points}"></td>
                        <td class="text-end">
                            <form th:action="@{'/admin-physical/norms/delete/' + ${n.id}}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div th:replace="~{blocks/pagination :: pagination(
                    page=${normPage},
                    targetParam='norm_page',
                    otherParam='scale_page',
                    otherPageNum=${scalePage.number}
                    )}">
                </div>
            </div>
        </div>
    </div>

    <!-- Блок 2 - Нормы -->
    <div id="scales-table" class="card shadow-sm">
        <div class="card-header bg-white p-4 border-0">
            <h5 class="mb-0 fw-bold"><i class="bi bi-graph-up text-success me-2"></i>Перевод суммы баллов (Прил. №12)</h5>
        </div>
        <div class="card-body p-4 pt-0">
            <form th:action="@{/admin-physical/scale}" method="post" th:object="${newScale}" class="row g-3 mb-4 bg-light p-3 rounded">
                <div class="col-md-3">
                    <label class="form-label small fw-bold">Сумма баллов</label>
                    <input type="number" th:field="*{sumPoints}" class="form-control" required placeholder="Напр: 250">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Возраст</label>
                    <select th:field="*{ageGroup}" class="form-select">
                        <option th:value="UNDER_25">До 25 лет</option>
                        <option th:value="OVER_25">25 лет и старше</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">Результат (0–100)</label>
                    <input type="number" th:field="*{scaledResult}" class="form-control" required placeholder="0–100">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i></button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr class="text-uppercase small text-muted">
                        <th>Сумма баллов</th>
                        <th>Возраст</th>
                        <th>Результат</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${scalePage.content}">
                        <td class="fw-bold" th:text="${s.sumPoints}"></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${s.ageGroup?.name() == 'UNDER_25' ? 'bg-primary-subtle text-primary' : 'bg-secondary-subtle text-secondary'}"
                                      th:text="${s.ageGroup?.name() == 'UNDER_25' ? 'До 25 лет' : '25+ лет'}"></span>
                        </td>
                        <td class="fw-bold text-success" th:text="${s.scaledResult}"></td>
                        <td class="text-end">
                            <form th:action="@{'/admin-physical/scale/delete/' + ${s.id}}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div th:replace="~{blocks/pagination :: pagination(
                    page=${scalePage},
                    targetParam='scale_page',
                    otherParam='norm_page',
                    otherPageNum=${normPage.number}
                    )}">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5 pt-4" sec:authorize="!hasAuthority('FULL')">
    <div class="alert alert-warning shadow-sm">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> У вас нет прав для администрирования этого раздела.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
