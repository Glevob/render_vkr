<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление сотрудниками</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; }
        .table thead { background-color: #f1f3f5; }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark m-0"><i class="bi bi-people-fill me-2 text-primary"></i>Сотрудники</h2>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> На главную</a>
            <a href="/admin/users/new" class="btn btn-primary"><i class="bi bi-person-plus-fill me-1"></i> Создать сотрудника</a>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="card shadow-sm mb-4">
        <div class="card-body p-3">
            <form th:action="@{/admin/users}" method="get" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-muted">Поиск по логину</label>
                    <input type="text" name="search" class="form-control" placeholder="Введите логин..." th:value="${search}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-muted">Роль доступа</label>
                    <select name="authority" class="form-select">
                        <option value="">Все роли</option>
                        <option th:each="auth : ${allAuthorities}"
                                th:value="${auth}"
                                th:text="${auth}"
                                th:selected="${auth.name() == selectedAuthority}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-search me-1"></i> Найти</button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary" th:if="${(search != null and !search.isEmpty()) or (selectedAuthority != null and !selectedAuthority.isEmpty())}">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Таблица -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="text-uppercase small text-muted">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Логин</th>
                    <th>Права доступа</th>
                    <th class="text-end pe-4">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td class="ps-4 text-muted small" th:text="${user.idUser}"></td>
                    <td class="fw-semibold" th:text="${user.login}"></td>
                    <td>
                        <span th:each="role : ${user.userRoles}" class="badge bg-light text-dark border me-1" th:text="${role.userAuthority}"></span>
                    </td>
                    <td class="text-end pe-4">
                        <a th:href="@{'/admin/users/' + ${user.idUser}}" class="btn btn-sm btn-outline-primary me-2">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <form th:action="@{'/admin/users/' + ${user.idUser} + '/delete'}" method="post" class="d-inline" onsubmit="return confirm('Удалить пользователя?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(users)}" class="text-center py-5 text-muted">
            <i class="bi bi-inbox fs-1 d-block mb-2"></i> Пользователи не найдены
        </div>
    </div>

    <!-- Продвинутая пагинация -->
    <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Page navigation">
        <ul class="pagination pagination-sm justify-content-center"
            th:with="urlParams = ${'search=' + (search ?: '') + '&authority=' + (selectedAuthority ?: '')}">

            <!-- В самое начало (Page 0) -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/users?page=0&' + ${urlParams}}">&laquo;&laquo;</a>
            </li>

            <!-- на 10 страниц влево -->
            <li class="page-item" th:classappend="${currentPage - 10 < 0} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/users?page=' + (${currentPage - 10}) + '&' + ${urlParams}}">-10</a>
            </li>

            <!-- Кнопки на 1-4 влево -->
            <li class="page-item" th:each="i : ${#numbers.sequence(4, 1)}" th:if="${currentPage - i >= 0}">
                <a class="page-link" th:href="@{'/admin/users?page=' + (${currentPage - i}) + '&' + ${urlParams}}" th:text="${currentPage - i + 1}"></a>
            </li>

            <!-- Текущая страница -->
            <li class="page-item active">
                <span class="page-link" th:text="${currentPage + 1}"></span>
            </li>

            <!-- Кнопки на 1-4 вправо -->
            <li class="page-item" th:each="i : ${#numbers.sequence(1, 4)}" th:if="${currentPage + i < totalPages}">
                <a class="page-link" th:href="@{'/admin/users?page=' + (${currentPage + i}) + '&' + ${urlParams}}" th:text="${currentPage + i + 1}"></a>
            </li>

            <!-- на 10 страниц вправо -->
            <li class="page-item" th:classappend="${currentPage + 10 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/users?page=' + (${currentPage + 10}) + '&' + ${urlParams}}">+10</a>
            </li>

            <!-- В самый конец -->
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/users?page=' + (${totalPages - 1}) + '&' + ${urlParams}}">&raquo;&raquo;</a>
            </li>
        </ul>
    </nav>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
