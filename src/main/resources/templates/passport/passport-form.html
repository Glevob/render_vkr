<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Паспорт студента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-form { max-width: 600px; margin: 0 auto; }
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
        <div class="card shadow card-form">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"
                    th:text="'Паспорт студента: ' + ${student.lastName} + ' ' + ${student.firstName}">
                    Паспорт студента
                </h4>
            </div>

            <div class="card-body">
                <form th:action="@{'/passports/student/' + ${student.idStudent} + '/save'}"
                      th:object="${passport}"
                      method="post">

                    <input type="hidden" th:field="*{id}"/>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Серия паспорта</label>
                            <input type="text" th:field="*{seriesPassport}" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Номер паспорта</label>
                            <input type="text" th:field="*{numberPassport}" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Дата выдачи</label>
                            <input type="date" th:field="*{datePassport}" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Место выдачи паспорта</label>
                        <input type="text" th:field="*{placePassport}" class="form-control"
                               placeholder="ОВД района ..., УФМС ...">
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/passports}" class="btn btn-outline-secondary">Назад к списку</a>
                        <button type="submit" class="btn btn-success">Сохранить</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
