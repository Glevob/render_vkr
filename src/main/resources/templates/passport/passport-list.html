<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Список паспортов студентов</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Список паспортов студентов</h1>
            <a th:href="@{/student-applied}" class="btn btn-outline-secondary">
                К списку студентов
            </a>
        </div>

        <!-- Если нет паспортов -->
        <div th:if="${#lists.isEmpty(passports)}" class="alert alert-info">
            Паспортов ещё нет. Добавьте паспорт для студента на его странице.
        </div>

        <!-- Таблица паспортов -->
        <div th:if="${!#lists.isEmpty(passports)}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>ФИО студента</th>
                    <th>Группа</th>
                    <th>Серия</th>
                    <th>Номер</th>
                    <th>Место выдачи</th>
                    <th>Дата выдачи</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="passport, stat : ${passports}">
                    <td th:text="${stat.index + 1}">1</td>

                    <!-- ФИО студента -->
                    <td>
                        <span th:text="${
                            passport.student != null
                            ? passport.student.lastName + ' ' +
                              passport.student.firstName + ' ' +
                              (passport.student.patronymic != null ? passport.student.patronymic : '')
                            : '—'
                        }">
                            Иванов Иван Иванович
                        </span>
                    </td>

                    <!-- Группа -->
                    <td th:text="${passport.student != null && passport.student.groupStudent != null
                                  ? passport.student.groupStudent.nameGroup
                                  : ''}">
                        ИУ5-21
                    </td>

                    <!-- Серия -->
                    <td th:text="${passport.seriesPassport}">1234</td>

                    <!-- Номер -->
                    <td th:text="${passport.numberPassport}">567890</td>

                    <!-- Место выдачи -->
                    <td th:text="${passport.placePassport}">ОВД района...</td>

                    <!-- Дата выдачи -->
                    <td th:text="${passport.datePassport}">2024-01-01</td>

                    <!-- Действия -->
                    <td class="text-nowrap">

                        <!-- Редактировать паспорт для студента -->
                        <a th:if="${passport.student != null}"
                           th:href="@{'/passports/student/' + ${passport.student.idStudent} + '/edit'}"
                           class="btn btn-outline-primary btn-sm mb-1">
                            Изменить
                        </a>

                        <!-- Удалить паспорт -->
                        <form th:action="@{'/passports/delete/' + ${passport.id}}"
                              method="post" class="d-inline-block">
                            <button type="submit"
                                    class="btn btn-outline-danger btn-sm mb-1"
                                    onclick="return confirm('Удалить паспорт?')">
                                Удалить
                            </button>
                        </form>

                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
