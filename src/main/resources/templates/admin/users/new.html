<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание сотрудника</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 mb-0">Создать сотрудника</h1>
        <a href="/admin/users" class="btn btn-outline-secondary btn-sm">
            ← К списку
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/users/new}"
                  th:object="${user}"
                  method="post">

                <div class="mb-3">
                    <label for="login" class="form-label">Логин</label>
                    <input type="text"
                           id="login"
                           class="form-control"
                           th:field="*{login}"
                           placeholder="Введите логин"
                           required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Введите пароль"
                           required>
                </div>

                <div class="mb-3">
                    <label for="authority" class="form-label">Права доступа</label>
                    <select id="authority"
                            class="form-select"
                            name="authority"
                            required>
                        <option value="" disabled selected>Выберите права</option>
                        <option th:each="auth : ${allAuthorities}"
                                th:value="${auth}"
                                th:text="${auth}">
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Создать
                    </button>
                    <a href="/admin/users" class="btn btn-outline-secondary">
                        Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
