<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание сотрудника</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { max-width: 600px; margin: 0 auto; border: none; border-radius: 12px; }
        .card-header { background-color: #fff; border-bottom: 1px solid #eee; border-radius: 12px 12px 0 0 !important; }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-5">
    <!-- Кнопка назад -->
    <div class="mb-4 text-center">
        <a href="/admin/users" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Вернуться к списку
        </a>
    </div>

    <!-- Карточка формы -->
    <div class="card form-card shadow-sm">
        <div class="card-header p-4">
            <h4 class="mb-0 fw-bold"><i class="bi bi-person-plus text-primary me-2"></i>Новый сотрудник</h4>
            <small class="text-muted">Заполните данные для создания учетной записи</small>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/admin/users/new}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label for="login" class="form-label small fw-bold">Логин</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                        <input type="text" id="login" class="form-control" th:field="*{login}" placeholder="Придумайте логин" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small fw-bold">Пароль</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Установите пароль" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="authority" class="form-label small fw-bold">Права доступа</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-shield-check"></i></span>
                        <select id="authority" class="form-select" name="authority" required>
                            <option value="" disabled selected>Выберите роль из списка...</option>
                            <option th:each="auth : ${allAuthorities}"
                                    th:value="${auth}"
                                    th:text="${auth}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary py-2 fw-bold">
                        <i class="bi bi-check-circle me-1"></i> Сохранить сотрудника
                    </button>
                    <a href="/admin/users" class="btn btn-light py-2">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
