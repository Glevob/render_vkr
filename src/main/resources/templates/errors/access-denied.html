<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Доступ ограничен</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 500px;
            border: none;
            border-radius: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-sm error-card mx-auto bg-white p-4 text-center">
        <div class="card-body">
            <div class="text-danger mb-4">
                <i class="bi bi-shield-x display-1"></i>
            </div>

            <h3 class="fw-bold text-dark mb-2">Доступ ограничен</h3>
            <p class="text-muted mb-4">
                У вас недостаточно прав для просмотра этой страницы. Если вы считаете, что это ошибка, пожалуйста, обратитесь к администратору системы.
            </p>

            <div class="d-grid gap-2">
                <a th:href="@{/}" class="btn btn-primary fw-medium py-2 shadow-sm">
                    <i class="bi bi-house-door me-1"></i> На главную
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary fw-medium py-2">
                    <i class="bi bi-arrow-left me-1"></i> Вернуться назад
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
