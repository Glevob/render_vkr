<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Распределение взводов</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f4f7f9; }
        .card { border: none; border-radius: 12px; }
        .table thead { background-color: #e9ecef; }
        .btn-filter { transition: all 0.2s; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main class="container my-5">
    <!-- Заголовок и кнопка перевода -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark"><i class="bi bi-people-fill me-2 text-primary"></i>Распределение по взводам</h2>

        <form id="transferForm" th:action="@{/platoons/transfer-next-course}" method="post" onsubmit="return handleTransferSubmit(this);">
            <button type="submit" id="transferBtn" class="btn btn-primary shadow-sm px-4">
                <i class="bi bi-arrow-right-circle me-1"></i> Перевести на новый курс
            </button>
        </form>
    </div>

    <!-- Фильтры -->
    <div class="card shadow-sm p-4 mb-4">
        <form th:action="@{/platoons/filter}" method="get" class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label small fw-bold text-muted">Программа подготовки</label>
                <select name="specialtyId" class="form-select">
                    <option value="">Все программы</option>
                    <option th:each="s : ${specialties}"
                            th:value="${s.id}"
                            th:text="${s.code + ' - ' + s.title}"
                            th:selected="${selectedSpecialtyId == s.id}">
                    </option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted">Взвод</label>
                <select name="platoonId" class="form-select">
                    <option value="">Все взводы</option>
                    <option th:each="p : ${platoons}"
                            th:value="${p.id}"
                            th:text="${p.namePlatoon}"
                            th:selected="${selectedPlatoonId == p.id}">
                    </option>
                </select>
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-outline-primary flex-grow-1">
                    <i class="bi bi-search me-1"></i> Найти
                </button>
                <a th:href="@{/platoons/filter}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
        </form>
    </div>

    <!-- Таблица -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">№</th>
                    <th>ФИО курсанта</th>
                    <th>Взвод</th>
                    <th>Программа обучения</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student, stat : ${students}">
                    <td class="ps-4 text-muted" th:text="${stat.index + 1}"></td>
                    <td class="fw-semibold" th:text="${student.lastName + ' ' + student.firstName + ' ' + student.patronymic}"></td>
                    <td>
                        <span class="badge bg-info-subtle text-info-emphasis border border-info-subtle"
                              th:text="${student.platoon != null ? student.platoon.namePlatoon : '—'}"></span>
                    </td>
                    <td class="text-secondary small"
                        th:text="${student.platoon != null && student.platoon.specialty != null ? student.platoon.specialty.code + ' — ' + student.platoon.specialty.title : '—'}">
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="4" class="text-center py-4 text-muted">Курсанты не найдены</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function handleTransferSubmit(form) {
        if (confirm('Внимание: это действие переведет всех курсантов на следующий курс. Продолжить?')) {
            const btn = document.getElementById('transferBtn');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Обработка...`;
            return true;
        }
        return false;
    }
</script>
</body>
</html>
